name: CCPocketMenubar
options:
  bundleIdPrefix: com.k9i.ccpocket
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CCPocketMenubar:
    type: application
    platform: macOS
    sources:
      - path: CCPocketMenubar
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.k9i.ccpocket.menubar
        INFOPLIST_FILE: CCPocketMenubar/Info.plist
        CODE_SIGN_ENTITLEMENTS: CCPocketMenubar/CCPocketMenubar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
