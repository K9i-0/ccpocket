name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://k9i-0.github.io/ccpocket/install/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Preserve Sparkle appcast
        env:
          SPARKLE_APPCAST_URL: https://k9i-0.github.io/ccpocket/sparkle/appcast.xml
        run: |
          set -euo pipefail

          APPCAST_PATH="docs/sparkle/appcast.xml"
          TMP_APPCAST="$(mktemp)"

          curl --fail --location --show-error --silent \
            --retry 3 --retry-delay 2 \
            "$SPARKLE_APPCAST_URL" \
            --output "$TMP_APPCAST"

          python3 - "$TMP_APPCAST" "$APPCAST_PATH" <<'PY'
          import shutil
          import sys
          import xml.etree.ElementTree as ET

          sparkle = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"

          def read_version(path):
              root = ET.parse(path).getroot()
              channel = root.find("channel")
              item = channel.find("item") if channel is not None else None
              enclosure = item.find("enclosure") if item is not None else None
              version = item.find(f"{sparkle}version") if item is not None else None
              short_version = (
                  item.find(f"{sparkle}shortVersionString")
                  if item is not None
                  else None
              )
              missing = []
              if root.tag != "rss":
                  missing.append("rss root")
              if channel is None:
                  missing.append("channel")
              if item is None:
                  missing.append("item")
              if version is None or not (version.text or "").strip():
                  missing.append("sparkle:version")
              if short_version is None or not (short_version.text or "").strip():
                  missing.append("sparkle:shortVersionString")
              if enclosure is None:
                  missing.append("enclosure")
              elif not enclosure.attrib.get(f"{sparkle}edSignature"):
                  missing.append("enclosure/@sparkle:edSignature")
              if missing:
                  raise SystemExit(
                      f"Invalid Sparkle appcast at {path}; missing "
                      + ", ".join(missing)
                  )
              return int(version.text.strip()), short_version.text.strip()

          published_path, repository_path = sys.argv[1:]
          published_build, published_semver = read_version(published_path)
          repository_build, repository_semver = read_version(repository_path)

          if published_build > repository_build:
              shutil.copyfile(published_path, repository_path)
              print(
                  "Preserving newer published Sparkle appcast "
                  f"{published_semver}+{published_build}"
              )
          else:
              print(
                  "Keeping repository Sparkle appcast "
                  f"{repository_semver}+{repository_build}"
              )
          PY

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
