name: Test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true
      - run: flutter pub get
        working-directory: apps/mobile
      - name: Generate SSH private key smoke credentials
        run: |
          mkdir -p tools/ssh-jump-smoke/generated
          ssh-keygen -t ed25519 -N "" -f tools/ssh-jump-smoke/generated/id_ed25519 -C ccpocket-smoke-test
      - name: Start SSH jump smoke containers
        run: docker compose -f tools/ssh-jump-smoke/docker-compose.yml up -d --build
      - name: Wait for SSH jump host
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 22220 && exit 0
            sleep 1
          done
          docker compose -f tools/ssh-jump-smoke/docker-compose.yml logs
          exit 1
      - name: Run SSH jump smoke test
        run: flutter test test/ssh_jump_smoke_test.dart
        working-directory: apps/mobile
        env:
          CCPOCKET_SSH_JUMP_SMOKE: "1"
          CCPOCKET_SSH_TARGET_HOST: target-sshd
          CCPOCKET_SSH_TARGET_PORT: "22"
          CCPOCKET_SSH_JUMP_HOST: 127.0.0.1
          CCPOCKET_SSH_JUMP_PORT: "22220"
          CCPOCKET_SSH_USERNAME: ccpocket
          CCPOCKET_SSH_PASSWORD: ccpocket
      - name: Run SSH Bridge tunnel smoke test
        run: flutter test test/ssh_bridge_tunnel_smoke_test.dart
        working-directory: apps/mobile
        env:
          CCPOCKET_SSH_BRIDGE_TUNNEL_SMOKE: "1"
          CCPOCKET_BRIDGE_TARGET_HOST: target-sshd
          CCPOCKET_BRIDGE_TARGET_PORT: "8765"
          CCPOCKET_SSH_JUMP_HOST: 127.0.0.1
          CCPOCKET_SSH_JUMP_PORT: "22220"
          CCPOCKET_SSH_USERNAME: ccpocket
          CCPOCKET_SSH_PASSWORD: ccpocket
      - name: Run SSH private key smoke test
        run: flutter test test/ssh_private_key_smoke_test.dart
        working-directory: apps/mobile
        env:
          CCPOCKET_SSH_PRIVATE_KEY_SMOKE: "1"
          CCPOCKET_SSH_PRIVATE_KEY_FILE: ../../tools/ssh-jump-smoke/generated/id_ed25519
          CCPOCKET_SSH_KEY_HOST: 127.0.0.1
          CCPOCKET_SSH_KEY_PORT: "22220"
          CCPOCKET_SSH_TARGET_HOST: target-sshd
          CCPOCKET_SSH_TARGET_PORT: "22"
          CCPOCKET_SSH_JUMP_HOST: 127.0.0.1
          CCPOCKET_SSH_JUMP_PORT: "22220"
          CCPOCKET_SSH_USERNAME: ccpocket
      - name: Stop SSH jump smoke containers
        if: always()
        run: docker compose -f tools/ssh-jump-smoke/docker-compose.yml down -v
      - run: dart analyze .
        working-directory: apps/mobile
      - run: flutter test
        working-directory: apps/mobile

  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true
      - name: Use precompiled Rust artifacts
        run: |
          printf '%s\n' 'use_precompiled_binaries: true' > apps/mobile/cargokit_options.yaml
      - run: flutter pub get
        working-directory: apps/mobile
      - run: pod install
        working-directory: apps/mobile/ios
      - name: Select iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available -j | jq -r '
            [.devices | to_entries[]
              | select(.key | contains("iOS"))
              | .value[]
              | select(.isAvailable == true)
              | select(.name | startswith("iPhone"))]
            | (first | .udid) // empty
          ')
          test -n "$SIMULATOR_ID"
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
      - name: Test iOS companion and Watch summary code
        working-directory: apps/mobile/ios
        run: |
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath "$RUNNER_TEMP/ccpocket-ios-debug" \
            -only-testing:RunnerTests
      - name: Verify Debug build includes Apple Watch
        run: |
          bash scripts/verify-ios-watch-payload.sh \
            included \
            "$RUNNER_TEMP/ccpocket-ios-debug/Build/Products/Debug-iphonesimulator/Runner.app"
      - name: Configure iPhone-only public project
        run: ruby scripts/configure-ios-watch-payload.rb exclude
      - name: Build public iPhone configuration
        working-directory: apps/mobile/ios
        run: |
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/ccpocket-ios-release" \
            CODE_SIGNING_ALLOWED=NO
      - name: Verify public build excludes Apple Watch
        run: |
          bash scripts/verify-ios-watch-payload.sh \
            excluded \
            "$RUNNER_TEMP/ccpocket-ios-release/Build/Products/Release-iphoneos/Runner.app"

  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Bridge tests
        run: npm run test:bridge
      - name: Type check Bridge
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json
      - name: Build Bridge
        run: npm run bridge:build

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - name: Install Functions dependencies
        run: npm ci --prefix functions
      - name: Run Functions tests
        run: npm --prefix functions test
      - name: Type check Functions
        run: npm --prefix functions run typecheck
      - name: Build Functions
        run: npm --prefix functions run build
