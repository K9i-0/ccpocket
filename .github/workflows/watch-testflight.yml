name: Apple Watch Internal TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-watch-internal-testflight
  cancel-in-progress: false

jobs:
  upload:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true
      - name: Install Codemagic CLI Tools
        run: |
          pipx install codemagic-cli-tools
          pipx ensurepath
      - name: Determine TestFlight version
        id: version
        run: |
          VERSION=$(sed -n 's/^version: \([^+]*\)+.*/\1/p' apps/mobile/pubspec.yaml)
          PUBSPEC_BUILD=$(sed -n 's/^version: [^+]*+\([0-9]*\).*/\1/p' apps/mobile/pubspec.yaml)
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){2}$ ]] ||
             ! [[ "$PUBSPEC_BUILD" =~ ^[0-9]+$ ]]; then
            echo "::error::Unable to determine a valid TestFlight version"
            exit 1
          fi
          # Reserve one thousand build numbers per workflow run so a re-run receives a
          # distinct CFBundleVersion without querying App Store Connect.
          BUILD_NUMBER=$((PUBSPEC_BUILD + GITHUB_RUN_NUMBER * 1000 + GITHUB_RUN_ATTEMPT))
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building Watch dogfood $VERSION ($BUILD_NUMBER)"
      - name: Setup Firebase config
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 -d > apps/mobile/ios/Runner/GoogleService-Info.plist
      - name: Use precompiled Rust artifacts
        run: |
          printf '%s\n' 'use_precompiled_binaries: true' > apps/mobile/cargokit_options.yaml
      - run: flutter pub get
        working-directory: apps/mobile
      - run: dart analyze .
        working-directory: apps/mobile
      - run: flutter test
        working-directory: apps/mobile
      - name: Test iOS and Watch companion code
        working-directory: apps/mobile/ios
        run: |
          pod install
          SIMULATOR_ID=$(xcrun simctl list devices available -j | jq -r '
            [.devices | to_entries[]
              | select(.key | contains("iOS"))
              | .value[]
              | select(.isAvailable == true)
              | select(.name | startswith("iPhone"))]
            | (first | .udid) // empty
          ')
          test -n "$SIMULATOR_ID"
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -only-testing:RunnerTests
      - name: Fetch signing files
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          for BUNDLE_ID in \
            com.k9i.ccpocket \
            com.k9i.ccpocket.watchkitapp \
            com.k9i.ccpocket.watchkitapp.widget; do
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --type IOS_APP_STORE --create
          done
      - name: Setup keychain
        run: keychain initialize
      - name: Add certs to keychain
        env:
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: keychain add-certificates
      - name: Set up code signing
        run: xcode-project use-profiles
      - name: Build Apple Watch dogfood IPA
        working-directory: apps/mobile
        env:
          REVENUECAT_PUBLIC_KEY: ${{ secrets.REVENUECAT_PUBLIC_KEY_IOS }}
        run: |
          flutter build ipa \
            --release \
            --build-name="${{ steps.version.outputs.marketing_version }}" \
            --build-number="${{ steps.version.outputs.build_number }}" \
            --export-options-plist="$HOME/export_options.plist" \
            --dart-define=REVENUECAT_PUBLIC_KEY="${REVENUECAT_PUBLIC_KEY}" \
            --no-tree-shake-icons
      - name: Find IPA file
        id: find_ipa
        run: |
          shopt -s nullglob
          IPA_FILES=(apps/mobile/build/ios/ipa/*.ipa)
          if [ "${#IPA_FILES[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one IPA, found ${#IPA_FILES[@]}"
            exit 1
          fi
          echo "ipa_path=${IPA_FILES[0]}" >> "$GITHUB_OUTPUT"
      - name: Verify Apple Watch payload
        run: |
          bash scripts/verify-ios-watch-payload.sh \
            included \
            "${{ steps.find_ipa.outputs.ipa_path }}"
      - name: Verify production entitlements
        run: |
          EXTRACT_DIR="$RUNNER_TEMP/ccpocket-watch-ipa"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "${{ steps.find_ipa.outputs.ipa_path }}" -d "$EXTRACT_DIR"

          RUNNER_APP="$EXTRACT_DIR/Payload/Runner.app"
          WATCH_APP="$RUNNER_APP/Watch/ccpocket Watch App.app"
          WATCH_WIDGET="$WATCH_APP/PlugIns/ccpocket Watch Widget.appex"
          RUNNER_ENTITLEMENTS="$RUNNER_TEMP/ccpocket-runner-entitlements.plist"
          WATCH_ENTITLEMENTS="$RUNNER_TEMP/ccpocket-watch-entitlements.plist"
          WIDGET_ENTITLEMENTS="$RUNNER_TEMP/ccpocket-widget-entitlements.plist"

          codesign -d --entitlements :- "$RUNNER_APP" > "$RUNNER_ENTITLEMENTS"
          codesign -d --entitlements :- "$WATCH_APP" > "$WATCH_ENTITLEMENTS"
          codesign -d --entitlements :- "$WATCH_WIDGET" > "$WIDGET_ENTITLEMENTS"

          APS_ENV=$(/usr/libexec/PlistBuddy -c 'Print :aps-environment' "$RUNNER_ENTITLEMENTS")
          EXPECTED_GROUP=group.com.k9i.ccpocket
          WATCH_GROUP=$(/usr/libexec/PlistBuddy \
            -c 'Print :com.apple.security.application-groups:0' \
            "$WATCH_ENTITLEMENTS")
          WIDGET_GROUP=$(/usr/libexec/PlistBuddy \
            -c 'Print :com.apple.security.application-groups:0' \
            "$WIDGET_ENTITLEMENTS")

          if [ "$APS_ENV" != "production" ]; then
            echo "::error::Expected aps-environment=production"
            exit 1
          fi
          if [ "$WATCH_GROUP" != "$EXPECTED_GROUP" ] ||
             [ "$WIDGET_GROUP" != "$EXPECTED_GROUP" ]; then
            echo "::error::Watch App Group entitlement is missing"
            exit 1
          fi
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5.2.1
        with:
          app-path: ${{ steps.find_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          wait-for-processing: 'false'
      - name: Write summary
        run: |
          {
            echo "## Apple Watch dogfood uploaded to TestFlight"
            echo
            echo "- Version: \`${{ steps.version.outputs.marketing_version }} (${{ steps.version.outputs.build_number }})\`"
            echo "- Next: add this build to the Apple Watch Dogfood internal group"
            echo "- Public iOS release workflow: Apple Watch payload excluded"
            echo
            echo "Processing continues in App Store Connect after this workflow completes."
          } >> "$GITHUB_STEP_SUMMARY"
