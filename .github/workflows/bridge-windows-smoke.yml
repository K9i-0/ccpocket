name: Bridge Windows Smoke

on:
  workflow_dispatch:

jobs:
  bridge-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Bridge Windows smoke tests
        run: npm run test:windows-smoke --workspace=packages/bridge
      - name: Type check Bridge
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json
      - name: Build Bridge
        run: npm run bridge:build
