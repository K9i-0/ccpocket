name: Bridge Windows Smoke

on:
  workflow_dispatch:

jobs:
  bridge-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Bridge Windows smoke tests
        run: npm run test:windows-smoke --workspace=packages/bridge
      - name: Type check Bridge
        run: npx tsc --noEmit -p packages/bridge/tsconfig.json
      - name: Build Bridge
        run: npm run bridge:build
